version: 1.0.0

approve:
  approver: fr12k
  include:
    branches:
      dependabot/github_actions:
        prefix: "dependabot/github_actions"
      dependabot_npm_and_yarn:
        prefix: "dependabot/npm_and_yarn"
      dependabot_golang:
        prefix: "dependabot/go_modules"
      dependabot_docker:
        prefix: "dependabot/docker"

merge:
  include:
    branches:
      dependabot/github_actions:
        prefix: "dependabot/github_actions"
      dependabot_npm_and_yarn:
        age: 1 days
        prefix: "dependabot/npm_and_yarn"
      dependabot_golang:
        age: 1 days
        prefix: "dependabot/go_modules"
      dependabot_docker:
        age: 1 days
        prefix: "dependabot/docker"
  method: squash
